<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>청새치 콘텐츠 생성기 v6</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: #f5f6f8;
      color: #171717;
    }

    .app {
      max-width: 1320px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    .hero { margin-bottom: 24px; }

    .badge {
      display: inline-flex;
      padding: 8px 12px;
      border-radius: 999px;
      background: #e8f1ff;
      color: #2563eb;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 5vw, 56px);
      letter-spacing: -0.07em;
      line-height: 1.05;
    }

    .hero p {
      margin: 0;
      color: #666;
      line-height: 1.65;
      font-size: 16px;
    }

    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 20px;
      align-items: start;
    }

    .panel {
      background: #fff;
      border: 1px solid rgba(0,0,0,0.07);
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 14px 45px rgba(0,0,0,0.06);
    }

    .panel h2 {
      margin: 0 0 16px;
      font-size: 20px;
      letter-spacing: -0.04em;
    }

    .panel h3 {
      margin: 22px 0 12px;
      font-size: 16px;
      letter-spacing: -0.03em;
    }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 900;
      color: #333;
    }

    select, input, textarea {
      width: 100%;
      border: 1px solid #d9dee8;
      border-radius: 14px;
      padding: 12px 13px;
      font-size: 14px;
      background: #fff;
      outline: none;
    }

    textarea {
      min-height: 92px;
      line-height: 1.55;
      resize: vertical;
    }

    select:focus, input:focus, textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37,99,235,.12);
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 13px 15px;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      transition: 0.15s;
    }

    button:hover { transform: translateY(-1px); }

    .primary { width: 100%; background: #171717; color: #fff; }
    .secondary { background: #eef2f7; color: #171717; }
    .blue { background:#2563eb; color:#fff; }
    .danger { background:#fff0f0; color:#d11; }

    .row { display: flex; gap: 10px; }
    .row > * { flex: 1; }

    .db-preview {
      background: #f7f9fc;
      border: 1px solid #edf0f5;
      border-radius: 16px;
      padding: 14px;
      font-size: 13px;
      line-height: 1.6;
      color: #555;
      white-space: pre-wrap;
    }



    .mode-box, .manual-box {
      background:#fbfcfe;
      border:1px solid #edf0f5;
      border-radius:18px;
      padding:16px;
      margin-bottom:16px;
    }

    .small-help {
      font-size:12px;
      color:#777;
      line-height:1.5;
      margin-top:8px;
    }

    .green { background:#16a34a; color:#fff; }

    .status {
      margin-top: 12px;
      font-size: 13px;
      color: #777;
      line-height: 1.5;
    }

    .empty {
      height: 420px;
      display: grid;
      place-items: center;
      color: #777;
      text-align: center;
      line-height: 1.7;
      background: #f7f9fc;
      border-radius: 20px;
      border: 1px dashed #d6dbe5;
    }

    .content-card {
      border: 1px solid #e5e8ef;
      border-radius: 18px;
      padding: 18px;
      background: #fff;
      margin-bottom: 14px;
    }

    .content-card b {
      display: block;
      margin-bottom: 8px;
      color: #2563eb;
      font-size: 13px;
    }

    .content-card h3 {
      margin: 0 0 10px;
      font-size: 22px;
      letter-spacing: -0.05em;
      line-height: 1.25;
      white-space: pre-line;
    }

    .content-card p {
      margin: 0;
      color: #444;
      line-height: 1.65;
      white-space: pre-line;
    }

    .tools {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    .tools button { flex: 1; }

    .text-output {
      background: #0f172a;
      color: #e5e7eb;
      border-radius: 18px;
      padding: 18px;
      line-height: 1.7;
      white-space: pre-wrap;
      font-size: 14px;
      overflow: auto;
    }

    .hashtags { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 8px; }

    .hashtag {
      padding: 7px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #2563eb;
      font-size: 13px;
      font-weight: 800;
    }

    .blog-title { font-size: 28px; letter-spacing: -0.06em; margin: 0 0 14px; }
    .section-title { margin: 18px 0 8px; font-size: 14px; color: #2563eb; }

    .edit-grid {
      display: grid;
      gap: 12px;
      margin-bottom: 20px;
    }

    .edit-item {
      border: 1px solid #e5e8ef;
      border-radius: 18px;
      padding: 16px;
      background: #fbfcfe;
    }

    .edit-item-title {
      font-size: 13px;
      font-weight: 900;
      color: #2563eb;
      margin-bottom: 10px;
    }

    .template-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .template-btn {
      text-align: left;
      padding: 12px;
      border-radius: 16px;
      background: #f4f6f9;
      border: 1px solid #e5e8ef;
      cursor: pointer;
    }

    .template-btn.active {
      background: #111827;
      color: #fff;
      border-color: #111827;
    }

    .template-btn strong {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
    }

    .template-btn span {
      display: block;
      font-size: 12px;
      opacity: 0.72;
      line-height: 1.35;
    }

    .control-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .control-box {
      background:#f7f9fc;
      border:1px solid #edf0f5;
      border-radius:16px;
      padding:14px;
    }

    .range-label {
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:13px;
      font-weight:900;
      margin-bottom:8px;
    }

    .watermark-box {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .toggle-line {
      display:flex;
      align-items:center;
      gap:8px;
      font-size:13px;
      font-weight:800;
      margin-bottom: 12px;
    }

    .toggle-line input { width:auto; }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(252px, 1fr));
      gap: 16px;
    }

    .preview-item {
      border: 1px solid #e5e8ef;
      border-radius: 18px;
      padding: 12px;
      background: #fff;
    }

    .ig-card {
      width: 216px;
      height: 270px;
      overflow: hidden;
      position: relative;
      color: #161616;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 25px 22px;
      isolation: isolate;
    }

    .ig-card.output-size {
      width: 1080px;
      height: 1350px;
      padding: 125px 110px;
    }

    .card-image {
      position:absolute;
      inset:0;
      z-index:0;
      display:none;
      overflow:hidden;
    }

    .has-card-image .card-image { display:block; }

    .card-image img {
      width:100%;
      height:100%;
      object-position:center;
    }

    .image-fit-cover { object-fit: cover; }
    .image-fit-contain { object-fit: contain; background:#f1f1f1; }
    .image-fit-original {
      object-fit: none;
      width:auto !important;
      height:auto !important;
      max-width:none;
      max-height:none;
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
    }

    .has-card-image::after {
      content:"";
      position:absolute;
      inset:0;
      background:rgba(0,0,0,.48);
      z-index:1;
    }

    .ig-title {
      white-space: pre-line;
      font-weight: 950;
      letter-spacing: -0.04em;
      line-height: 1.12;
      font-size: var(--preview-title-size, 18px);
      color: var(--title-color, #111111);
      position: relative;
      z-index: 2;
    }

    .output-size .ig-title { font-size: var(--output-title-size, 155px); }

    .ig-body {
      white-space: pre-line;
      font-size: var(--preview-body-size, 13px);
      line-height: 1.5;
      color: var(--body-color, #444444);
      font-weight: 650;
      position: relative;
      z-index: 2;
    }

    .output-size .ig-body { font-size: var(--output-body-size, 58px); }

    .has-card-image .ig-title,
    .has-card-image .ig-body,
    .has-card-image .ig-number { color:#fff; }

    .has-card-image .ig-body { color: rgba(255,255,255,.86); }

    .ig-number {
      position: absolute;
      top: 24px;
      right: 22px;
      font-size: 12px;
      font-weight: 950;
      letter-spacing: -0.02em;
      opacity: 0.45;
      z-index: 3;
    }

    .output-size .ig-number {
      top: 90px;
      right: 98px;
      font-size: 48px;
    }

    .watermark {
      position: absolute;
      right: 18px;
      bottom: 18px;
      z-index: 5;
      opacity: 0.28;
      max-width: 74px;
      max-height: 44px;
      object-fit: contain;
      display: none;
    }

    .output-size .watermark {
      right: 72px;
      bottom: 72px;
      max-width: 300px;
      max-height: 180px;
    }

    .wm-on .watermark { display:block; }

    .template-basic {
      background:
        radial-gradient(circle at 88% 12%, rgba(37,99,235,.18), transparent 28%),
        linear-gradient(135deg,#fff 0%,#f8fafc 58%,#e8f1ff 100%);
    }

    .template-basic::before {
      content: "";
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(0,0,0,.08);
      z-index: 1;
      pointer-events:none;
    }

    .output-size.template-basic::before { inset: 70px; }

    .template-memo {
      background: #fff7c7;
      background-image: linear-gradient(rgba(0,0,0,.05) 1px, transparent 1px);
      background-size: 100% 32px;
    }

    .template-memo::before {
      content: "";
      position:absolute;
      top:0;
      left:22px;
      width:2px;
      height:100%;
      background: rgba(255,77,77,.35);
      z-index:1;
    }

    .output-size.template-memo::before { left:110px; width:8px; }

    .template-ios {
      background: #f7f7f2;
    }

    .template-ios::before {
      content: "메모";
      position:absolute;
      top:22px;
      left:22px;
      font-size:12px;
      font-weight:900;
      color:#f59e0b;
      z-index:2;
    }

    .output-size.template-ios::before {
      top:84px;
      left:110px;
      font-size:52px;
    }

    .template-ios .ig-title { margin-top: 28px; }
    .output-size.template-ios .ig-title { margin-top: 110px; }

    .template-news {
      background: #0b1220;
      color: #fff;
    }

    .template-news .ig-body { color: rgba(255,255,255,.78); }

    .template-news::before {
      content: "BREAKING";
      position:absolute;
      top:22px;
      left:22px;
      padding:5px 9px;
      background:#ef4444;
      color:#fff;
      font-size:10px;
      font-weight:950;
      letter-spacing:.05em;
      z-index:2;
    }

    .output-size.template-news::before {
      top:84px;
      left:110px;
      padding:22px 38px;
      font-size:42px;
    }

    .template-news .ig-title { margin-top: 28px; }
    .output-size.template-news .ig-title { margin-top: 120px; }

    .template-paper {
      background:#f3ead7;
      color:#161616;
    }

    .template-paper::before {
      content:"[속보]";
      position:absolute;
      top:22px;
      left:22px;
      right:22px;
      padding-bottom:8px;
      border-bottom:2px solid #161616;
      text-align:center;
      font-family: Georgia, "Apple SD Gothic Neo", serif;
      font-weight:900;
      font-size:16px;
      z-index:2;
    }

    .output-size.template-paper::before {
      top:84px;
      left:110px;
      right:110px;
      padding-bottom:30px;
      border-bottom-width:8px;
      font-size:70px;
    }

    .template-paper .ig-title {
      font-family: Georgia, "Apple SD Gothic Neo", serif;
      letter-spacing:-0.065em;
      margin-top:42px;
    }

    .output-size.template-paper .ig-title { margin-top:170px; }


    .conditional-input { display:none; margin-top:8px; }
    .conditional-input.show { display:block; }

    .template-x {
      background:#ffffff;
      color:#111827;
    }

    .template-x::before {
      content:"@cshchi";
      position:absolute;
      top:22px;
      left:22px;
      font-size:13px;
      font-weight:900;
      color:#111827;
      z-index:2;
    }

    .output-size.template-x::before {
      top:88px;
      left:110px;
      font-size:52px;
    }

    .template-x .ig-title { margin-top:38px; }
    .output-size.template-x .ig-title { margin-top:150px; }

    .template-talk {
      background:#bacee0;
      color:#111827;
      justify-content:flex-start;
      gap:14px;
    }

    .template-talk .ig-title,
    .template-talk .ig-body {
      background:#fff;
      border-radius:16px;
      padding:12px 14px;
      letter-spacing:-0.04em;
      width:92%;
    }

    .template-talk .ig-title { align-self:flex-start; }
    .template-talk .ig-body { align-self:flex-end; background:#ffe85c; }
    .output-size.template-talk .ig-title,
    .output-size.template-talk .ig-body { border-radius:70px; padding:55px 64px; }

    .template-notion {
      background:#fbfbfa;
      color:#111827;
    }

    .template-notion::before {
      content:"▦ Notion";
      position:absolute;
      top:22px;
      left:22px;
      font-size:13px;
      font-weight:900;
      color:#6b7280;
      z-index:2;
    }

    .output-size.template-notion::before { top:88px; left:110px; font-size:52px; }
    .template-notion .ig-title { margin-top:42px; }
    .output-size.template-notion .ig-title { margin-top:160px; }

    .template-mac {
      background:#eceff4;
      color:#111827;
      padding-top:46px;
    }

    .template-mac::before {
      content:"";
      position:absolute;
      top:18px;
      left:22px;
      width:12px;
      height:12px;
      border-radius:50%;
      background:#ff5f57;
      box-shadow:20px 0 0 #febc2e, 40px 0 0 #28c840;
      z-index:3;
    }

    .template-mac::after {
      content:"";
      position:absolute;
      inset:14px;
      border:1px solid rgba(0,0,0,.12);
      border-radius:18px;
      background:rgba(255,255,255,.42);
      z-index:1;
      pointer-events:none;
    }

    .output-size.template-mac { padding-top:220px; }
    .output-size.template-mac::before { top:78px; left:110px; width:46px; height:46px; box-shadow:78px 0 0 #febc2e, 156px 0 0 #28c840; }
    .output-size.template-mac::after { inset:70px; border-radius:80px; }

    .template-board {
      background:#1f4d3a;
      color:#f8fafc;
      box-shadow: inset 0 0 0 12px rgba(130,83,45,.75);
    }

    .template-board .ig-title,
    .template-board .ig-body { color:#f8fafc; }
    .template-board::before {
      content:"TODAY'S NOTE";
      position:absolute;
      top:24px;
      left:26px;
      font-size:11px;
      font-weight:900;
      color:rgba(255,255,255,.7);
      z-index:2;
    }
    .output-size.template-board { box-shadow: inset 0 0 0 56px rgba(130,83,45,.75); }
    .output-size.template-board::before { top:115px; left:130px; font-size:42px; }

    .template-browser {
      background:#f8fafc;
      color:#111827;
      padding-top:58px;
    }

    .template-browser::before {
      content:"🔴 🟡 🟢   ◀  ▶  ⟳   https://homepage.com";
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:42px;
      padding:13px 18px;
      background:#e5e7eb;
      border-bottom:1px solid rgba(0,0,0,.10);
      font-size:10px;
      font-weight:800;
      color:#374151;
      z-index:3;
      white-space:nowrap;
      overflow:hidden;
    }

    .output-size.template-browser { padding-top:280px; }
    .output-size.template-browser::before { height:170px; padding:54px 90px; font-size:42px; }

    .hidden-render-area {
      position: fixed;
      left: -99999px;
      top: 0;
      width: 1080px;
      height: 1350px;
      pointer-events: none;
      opacity: 0;
    }

    .download-all {
      margin-top: 16px;
      display:flex;
      gap:10px;
    }

    .download-all button { flex:1; }

    .image-controls {
      margin-top:12px;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:8px;
      align-items:end;
    }

    .image-controls button {
      padding:10px;
      font-size:12px;
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .watermark-box { grid-template-columns:1fr; }
      .image-controls { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="badge">CHEONGSAECHI CONTENT STUDIO</div>
      <h1>청새치 콘텐츠 생성기 v6</h1>
      <p>아이디어 입력, AI 추천, 분량 선택, 직접 목표/톤/구조 입력, 11종 카드뉴스 템플릿을 지원합니다.</p>
    </section>

    <section class="layout">
      <aside class="panel">
        <h2>생성 설정</h2>

        <div class="mode-box">
          <div class="form-group">
            <label for="categorySelect">DB 카테고리</label>
            <select id="categorySelect" onchange="onCategoryChange()"></select>
          </div>

          <div class="form-group">
            <label for="topicSelect">DB 주제</label>
            <select id="topicSelect" onchange="onTopicChange()"></select>
          </div>

          <button class="secondary" style="width:100%;" onclick="loadSelectedToManual()">선택 DB를 입력칸에 불러오기</button>
        </div>

        <div class="form-group">
          <label for="contentType">콘텐츠 유형</label>
          <select id="contentType" onchange="onContentTypeChange()">
            <option value="카드뉴스">카드뉴스</option>
            <option value="인스타설명글">인스타 설명글</option>
            <option value="블로그">블로그</option>
            <option value="스레드">스레드</option>
          </select>
        </div>

        <div class="row">
          <div class="form-group">
            <label for="contentGoal">콘텐츠 목표</label>
            <select id="contentGoal" onchange="toggleCustomInput('contentGoal', 'customContentGoal')">
              <option value="알아서 해줘">알아서 해줘</option>
              <option value="__custom__">직접 입력</option>
            </select>
            <input id="customContentGoal" class="conditional-input" placeholder="예: 저장 유도, 댓글 유도, 상담 유도" />
          </div>

          <div class="form-group">
            <label for="tone">톤</label>
            <select id="tone" onchange="toggleCustomInput('tone', 'customTone')">
              <option value="알아서 해줘">알아서 해줘</option>
              <option value="__custom__">직접 입력</option>
            </select>
            <input id="customTone" class="conditional-input" placeholder="예: 친구처럼, 전문적으로, SNS 감성" />
          </div>
        </div>

        <div class="row">
          <div class="form-group">
            <label for="framework">구조</label>
            <select id="framework" onchange="toggleCustomInput('framework', 'customFramework')">
              <option value="알아서 해줘">알아서 해줘</option>
              <option value="__custom__">직접 입력</option>
            </select>
            <input id="customFramework" class="conditional-input" placeholder="예: 문제→원인→해결, 경험→깨달음→적용" />
          </div>

          <div class="form-group">
            <label for="contentLength">분량</label>
            <select id="contentLength" onchange="toggleCustomInput('contentLength', 'customLength')">
              <option value="AI 추천">AI 추천</option>
              <option value="짧게">짧게</option>
              <option value="보통">보통</option>
              <option value="길게">길게</option>
              <option value="직접 입력">직접 입력</option>
            </select>
            <input id="customLength" class="conditional-input" placeholder="예: 카드뉴스 8장, 스레드 6개" />
          </div>
        </div>

        <div class="form-group">
          <label for="brand">브랜드</label>
          <input id="brand" value="청새치웹" />
        </div>

        <div class="manual-box">
          <h3 style="margin-top:0;">직접 입력 / 수정</h3>
          <input type="hidden" id="manualId" />

          <div class="form-group">
            <label for="manualCategorySelect">카테고리</label>
            <select id="manualCategorySelect" onchange="toggleManualCategoryInput()"></select>
            <input id="manualCategoryCustom" class="conditional-input" placeholder="예: 웹사이트" />
          </div>

          <div class="form-group">
            <label for="manualTopic">아이디어</label>
            <div class="row">
              <input id="manualTopic" placeholder="예: 예쁜 홈페이지 문의 없음" />
              <button class="secondary" type="button" onclick="suggestIdea()">AI 추천</button>
            </div>
            <div class="small-help">거친 아이디어를 입력한 뒤 AI 추천을 누르면 주제와 빈칸을 자동으로 채웁니다.</div>
          </div>

          <div class="form-group">
            <label for="manualCore">핵심메시지</label>
            <textarea id="manualCore" placeholder="예: 구조가 잡혀 있지 않으면 문의가 발생하기 어렵다"></textarea>
          </div>

          <div class="form-group">
            <label>근거</label>
            <input id="manualEvidence1" placeholder="근거1" style="margin-bottom:8px;" />
            <input id="manualEvidence2" placeholder="근거2" style="margin-bottom:8px;" />
            <input id="manualEvidence3" placeholder="근거3" />
          </div>

          <div class="form-group">
            <label for="manualRequired">반드시 포함할 내용</label>
            <input id="manualRequired" placeholder="예: 구조,전환,CTA" />
          </div>

          <div class="form-group">
            <label for="manualForbidden">금지내용</label>
            <input id="manualForbidden" placeholder="예: SEO,광고비" />
          </div>

          <div class="form-group">
            <label for="manualMemo">메모 <span style="color:#777;">DB에 저장됨</span></label>
            <textarea id="manualMemo" placeholder="예: 청새치웹 전환 관점 강조"></textarea>
          </div>

          <div class="form-group">
            <label for="extraPrompt">AI 추가 요청사항 <span style="color:#777;">이번 생성에만 적용</span></label>
            <textarea id="extraPrompt" placeholder="예)
- 후킹을 강하게 해주세요
- 초보 사장님 기준으로 설명해주세요
- 실제 사례를 넣어주세요
- SEO 이야기는 제외해주세요"></textarea>
          </div>

          <div class="row">
            <button class="secondary" onclick="generateTemporary()">임시 생성</button>
            <button class="blue" onclick="saveAndGenerate()">저장 생성</button>
          </div>
          <button class="green" style="width:100%; margin-top:10px;" onclick="updateAndGenerate()">수정 저장</button>
          <div class="small-help">
            임시 생성은 DB에 저장하지 않습니다. 저장 생성은 새 행을 추가하고 생성합니다. 수정 저장은 현재 ID가 있는 항목을 업데이트합니다.
          </div>
        </div>

        <div class="form-group">
          <label>선택한 DB 내용</label>
          <div id="dbPreview" class="db-preview">DB를 불러오는 중...</div>
        </div>

        <button class="primary" onclick="generateFromSelectedDB()">DB 선택 주제로 생성하기</button>
        <div id="status" class="status"></div>
      </aside>

      <section class="panel result">
        <div class="tools">
          <button class="secondary" onclick="copyResult()">결과 복사</button>
          <button class="secondary" onclick="clearResult()">결과 지우기</button>
        </div>

        <div id="result">
          <div class="empty">
            DB에서 주제를 선택하거나 아이디어를 입력한 뒤<br />
            생성 버튼을 눌러주세요.
          </div>
        </div>
      </section>
    </section>
  </main>

  <div id="hiddenRenderArea" class="hidden-render-area"></div>

  <script>
    const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbwIz8EbtrxM9Ss4G3rLteVQ45ZhN8gtrKfE1KiuiQBK8XgPp2noMu-6ZSRmAJrtbdU8/exec";
    const GENERATE_API_URL = "https://cardnews-maker-lyart.vercel.app/api/generate";

    const templates = {
      basic: { name: "기본형", desc: "화이트·구조형", className: "template-basic" },
      memo: { name: "메모장형", desc: "노란 메모지", className: "template-memo" },
      ios: { name: "iOS형", desc: "아이폰 메모 느낌", className: "template-ios" },
      news: { name: "뉴스형", desc: "속보·강조형", className: "template-news" },
      paper: { name: "신문형", desc: "[속보] 신문 칼럼형", className: "template-paper" },
      x: { name: "X 캡처형", desc: "@cshchi 포스트 느낌", className: "template-x" },
      talk: { name: "카톡 대화형", desc: "대화 캡처 느낌", className: "template-talk" },
      notion: { name: "노션형", desc: "문서·체크리스트 느낌", className: "template-notion" },
      mac: { name: "맥 팝업형", desc: "macOS 팝업창 UI", className: "template-mac" },
      board: { name: "칠판형", desc: "강의·교육 콘텐츠", className: "template-board" },
      browser: { name: "브라우저형", desc: "https://homepage.com", className: "template-browser" }
    };

    let contentDB = [];
    let selectedItem = null;
    let lastPlainText = "";
    let cardNewsData = [];
    let selectedTemplate = "basic";
    let watermarkDataUrl = "";
    let watermarkEnabled = true;
    let watermarkOpacity = 28;
    let titleSize = 90;
    let bodySize = 50;
    let titleColor = "#111111";
    let bodyColor = "#444444";

    window.addEventListener("DOMContentLoaded", loadContentDB);

    async function loadContentDB() {
      setStatus("구글 시트 DB를 불러오는 중...");
      try {
        const res = await fetch(SHEET_API_URL);
        contentDB = await res.json();

        const waitingItems = contentDB.filter(item => String(item["상태"] || "").trim() !== "완료");
        contentDB = waitingItems.length ? waitingItems : contentDB;

        renderCategories();
        setStatus(`DB 로드 완료: ${contentDB.length}개 주제`);
      } catch (error) {
        setStatus("DB 로드 실패: " + error.message);
      }
    }

    function renderCategories() {
      const categorySelect = document.getElementById("categorySelect");
      const categories = [...new Set(contentDB.map(item => item["카테고리"]).filter(Boolean))];

      categorySelect.innerHTML = categories
        .map(category => `<option value="${escapeAttr(category)}">${escapeHtml(category)}</option>`)
        .join("");

      renderManualCategoryOptions(categories);
      onCategoryChange();
    }

    function renderManualCategoryOptions(categories) {
      const select = document.getElementById("manualCategorySelect");
      if (!select) return;

      select.innerHTML = [`<option value="__custom__">직접 입력</option>`]
        .concat(categories.map(category => `<option value="${escapeAttr(category)}">${escapeHtml(category)}</option>`))
        .join("");

      toggleManualCategoryInput();
    }

    function onCategoryChange() {
      const category = document.getElementById("categorySelect").value;
      const topicSelect = document.getElementById("topicSelect");
      const topics = contentDB.filter(item => item["카테고리"] === category);

      topicSelect.innerHTML = topics
        .map(item => `<option value="${escapeAttr(item["ID"])}">${escapeHtml(item["주제"])}</option>`)
        .join("");

      onTopicChange();
    }

    function onTopicChange() {
      const id = String(document.getElementById("topicSelect").value);
      selectedItem = contentDB.find(item => String(item["ID"]) === id) || null;
      renderDBPreview();
    }

    function onContentTypeChange() {
      clearResult();
    }

    function renderDBPreview() {
      const box = document.getElementById("dbPreview");

      if (!selectedItem) {
        box.textContent = "선택된 주제가 없습니다.";
        return;
      }

      box.textContent =
`주제: ${selectedItem["주제"] || ""}
핵심메시지: ${selectedItem["핵심메시지"] || ""}

근거
1. ${selectedItem["근거1"] || ""}
2. ${selectedItem["근거2"] || ""}
3. ${selectedItem["근거3"] || ""}

반드시포함: ${selectedItem["반드시포함"] || ""}
금지내용: ${selectedItem["금지내용"] || ""}
메모: ${selectedItem["메모"] || ""}`;
    }

    async function generateContent() {
      return generateFromSelectedDB();
    }



    function loadSelectedToManual() {
      if (!selectedItem) return alert("불러올 DB 주제를 먼저 선택해주세요.");
      document.getElementById("manualId").value = selectedItem["ID"] || "";
      setManualCategory(selectedItem["카테고리"] || "");
      document.getElementById("manualTopic").value = selectedItem["주제"] || "";
      document.getElementById("manualCore").value = selectedItem["핵심메시지"] || "";
      document.getElementById("manualEvidence1").value = selectedItem["근거1"] || "";
      document.getElementById("manualEvidence2").value = selectedItem["근거2"] || "";
      document.getElementById("manualEvidence3").value = selectedItem["근거3"] || "";
      document.getElementById("manualRequired").value = selectedItem["반드시포함"] || "";
      document.getElementById("manualForbidden").value = selectedItem["금지내용"] || "";
      document.getElementById("manualMemo").value = selectedItem["메모"] || "";
      setStatus("선택한 DB 내용을 입력칸에 불러왔습니다.");
    }

    function setManualCategory(category) {
      const select = document.getElementById("manualCategorySelect");
      const custom = document.getElementById("manualCategoryCustom");
      if (!select || !custom) return;

      const options = Array.from(select.options).map(option => option.value);
      if (options.includes(category)) {
        select.value = category;
        custom.value = "";
      } else {
        select.value = "__custom__";
        custom.value = category;
      }
      toggleManualCategoryInput();
    }

    function toggleManualCategoryInput() {
      const select = document.getElementById("manualCategorySelect");
      const custom = document.getElementById("manualCategoryCustom");
      if (!select || !custom) return;
      custom.classList.toggle("show", select.value === "__custom__");
    }

    function getManualCategory() {
      const select = document.getElementById("manualCategorySelect");
      const custom = document.getElementById("manualCategoryCustom");
      if (!select) return "";
      if (select.value === "__custom__") return (custom?.value || "").trim();
      return select.value.trim();
    }

    function getOptionValue(selectId, inputId) {
      const select = document.getElementById(selectId);
      const input = document.getElementById(inputId);
      if (!select) return "알아서 해줘";
      if (select.value === "__custom__") return (input?.value || "").trim() || "알아서 해줘";
      return select.value;
    }

    function toggleCustomInput(selectId, inputId) {
      const select = document.getElementById(selectId);
      const input = document.getElementById(inputId);
      if (!select || !input) return;
      input.classList.toggle("show", select.value === "__custom__" || select.value === "직접 입력");
    }

    async function suggestIdea() {
      const rawIdea = document.getElementById("manualTopic").value.trim();
      if (!rawIdea) return alert("아이디어를 먼저 입력해주세요.");

      setStatus("AI가 아이디어를 정리하는 중...");
      try {
        const res = await fetch(GENERATE_API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            mode: "idea",
            rawIdea,
            brand: document.getElementById("brand").value,
            categoryHint: getManualCategory(),
            extraPrompt: document.getElementById("extraPrompt").value.trim()
          })
        });

        const data = await res.json();
        if (data.error) throw new Error(data.error);

        const suggestion = safeJsonParse(data.result);
        setManualCategory(suggestion.category || "");
        document.getElementById("manualTopic").value = suggestion.topic || rawIdea;
        document.getElementById("manualCore").value = suggestion.coreMessage || "";
        document.getElementById("manualEvidence1").value = suggestion.evidence1 || "";
        document.getElementById("manualEvidence2").value = suggestion.evidence2 || "";
        document.getElementById("manualEvidence3").value = suggestion.evidence3 || "";
        document.getElementById("manualRequired").value = suggestion.requiredKeywords || "";
        document.getElementById("manualForbidden").value = suggestion.forbiddenTopics || "";
        document.getElementById("manualMemo").value = suggestion.memo || "";
        setStatus("AI 추천 완료. 내용을 확인한 뒤 임시 생성 또는 저장 생성을 눌러주세요.");
      } catch (error) {
        alert("AI 추천 실패: " + error.message);
        setStatus("AI 추천 실패");
      }
    }

    function getManualItem() {
      return {
        "ID": document.getElementById("manualId").value.trim(),
        "카테고리": getManualCategory(),
        "주제": document.getElementById("manualTopic").value.trim(),
        "핵심메시지": document.getElementById("manualCore").value.trim(),
        "근거1": document.getElementById("manualEvidence1").value.trim(),
        "근거2": document.getElementById("manualEvidence2").value.trim(),
        "근거3": document.getElementById("manualEvidence3").value.trim(),
        "반드시포함": document.getElementById("manualRequired").value.trim(),
        "금지내용": document.getElementById("manualForbidden").value.trim(),
        "상태": "대기",
        "메모": document.getElementById("manualMemo").value.trim(),
        "카드뉴스": true,
        "인스타설명글": true,
        "블로그": true,
        "스레드": true
      };
    }

    function validateManualItem(item) {
      if (!item["카테고리"]) return "카테고리를 입력해주세요.";
      if (!item["주제"]) return "주제를 입력해주세요.";
      if (!item["핵심메시지"]) return "핵심메시지를 입력해주세요.";
      return "";
    }

    async function generateTemporary() {
      const item = getManualItem();
      const error = validateManualItem(item);
      if (error) return alert(error);
      await generateByItem(item);
    }

    async function saveAndGenerate() {
      const item = getManualItem();
      item["ID"] = "";
      const error = validateManualItem(item);
      if (error) return alert(error);
      try {
        setStatus("DB에 새 주제를 저장하는 중...");
        const saved = await saveToSheet("create", item);
        selectedItem = saved;
        await loadContentDB();
        await generateByItem(saved);
      } catch (error) {
        alert("저장 실패: " + error.message);
        setStatus("저장 실패");
      }
    }

    async function updateAndGenerate() {
      const item = getManualItem();
      if (!item["ID"]) return alert("수정 저장하려면 먼저 DB 주제를 불러오거나 ID가 있어야 합니다.");
      const error = validateManualItem(item);
      if (error) return alert(error);
      try {
        setStatus("DB 내용을 수정 저장하는 중...");
        const saved = await saveToSheet("update", item);
        selectedItem = saved;
        await loadContentDB();
        await generateByItem(saved);
      } catch (error) {
        alert("수정 저장 실패: " + error.message);
        setStatus("수정 저장 실패");
      }
    }

    async function saveToSheet(action, item) {
      const res = await fetch(SHEET_API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action, item })
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "Apps Script 저장 오류");
      return data.item;
    }

    async function generateByItem(item) {
      const contentType = document.getElementById("contentType").value;

      if (!isAllowedContentType(item, contentType)) {
        alert(`이 주제는 '${contentType}' 생성이 FALSE로 되어 있습니다.`);
        return;
      }

      setStatus("AI가 콘텐츠를 생성하는 중...");
      document.getElementById("result").innerHTML = `<div class="empty">생성 중...</div>`;

      const payload = {
        id: item["ID"],
        category: item["카테고리"],
        topic: item["주제"],
        coreMessage: item["핵심메시지"],
        evidence1: item["근거1"],
        evidence2: item["근거2"],
        evidence3: item["근거3"],
        requiredKeywords: item["반드시포함"],
        forbiddenTopics: item["금지내용"],
        memo: item["메모"],
        extraPrompt: document.getElementById("extraPrompt").value.trim(),
        contentType,
        contentGoal: getOptionValue("contentGoal", "customContentGoal"),
        tone: getOptionValue("tone", "customTone"),
        framework: getOptionValue("framework", "customFramework"),
        contentLength: document.getElementById("contentLength").value,
        customLength: document.getElementById("customLength").value.trim(),
        brand: document.getElementById("brand").value
      };

      try {
        const res = await fetch(GENERATE_API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        const parsed = safeJsonParse(data.result);
        renderResult(contentType, parsed, data.result);
        setStatus("생성 완료");
      } catch (error) {
        document.getElementById("result").innerHTML = `<div class="text-output">에러 발생: ${escapeHtml(error.message)}</div>`;
        setStatus("생성 실패");
      }
    }

    async function generateFromSelectedDB() {
      if (!selectedItem) {
        alert("DB 주제를 먼저 선택해주세요.");
        return;
      }
      await generateByItem(selectedItem);
    }

    function getFrameworkValue() {
      const raw = document.getElementById("framework").value;
      return raw.split("·")[0].trim();
    }

    function isAllowedContentType(item, type) {
      const value = item[type];
      return value === true || String(value).toUpperCase() === "TRUE" || value === 1;
    }

    function safeJsonParse(text) {
      try {
        return JSON.parse(text);
      } catch (error) {
        const cleaned = String(text)
          .replace(/^```json\s*/i, "")
          .replace(/^```\s*/i, "")
          .replace(/```$/i, "")
          .trim();
        return JSON.parse(cleaned);
      }
    }

    function renderResult(contentType, parsed, raw) {
      if (contentType === "카드뉴스") renderCardNewsWorkbench(parsed);
      else if (contentType === "인스타설명글") renderInstagram(parsed);
      else if (contentType === "블로그") renderBlog(parsed);
      else if (contentType === "스레드") renderThreads(parsed);
      else renderRaw(raw);
    }

    function renderCardNewsWorkbench(cards) {
      cardNewsData = cards.map(card => ({
        title: card.title || "",
        body: card.body || "",
        image: "",
        imageFit: "cover"
      }));

      updatePlainCardText();

      document.getElementById("result").innerHTML = `
        <h2>카드뉴스 문구 수정</h2>
        <div class="edit-grid" id="cardEditors"></div>

        <h3>디자인 템플릿</h3>
        <div class="template-grid" id="templateGrid"></div>

        <h3>텍스트 설정</h3>
        <div class="control-grid">
          <div class="control-box">
            <div class="range-label">
              <span>제목 크기</span>
              <span id="titleSizeText">${titleSize}px</span>
            </div>
            <input type="range" min="60" max="190" value="${titleSize}" oninput="changeTitleSize(this.value)" />
          </div>
          <div class="control-box">
            <div class="range-label">
              <span>본문 크기</span>
              <span id="bodySizeText">${bodySize}px</span>
            </div>
            <input type="range" min="30" max="84" value="${bodySize}" oninput="changeBodySize(this.value)" />
          </div>
          <div class="control-box">
            <div class="range-label"><span>제목 색상</span><span id="titleColorText">${titleColor}</span></div>
            <input type="color" value="${titleColor}" oninput="changeTitleColor(this.value)" />
          </div>
          <div class="control-box">
            <div class="range-label"><span>본문 색상</span><span id="bodyColorText">${bodyColor}</span></div>
            <input type="color" value="${bodyColor}" oninput="changeBodyColor(this.value)" />
          </div>
        </div>

        <h3>워터마크</h3>
        <div class="watermark-box">
          <div>
            <label>로고 이미지 업로드</label>
            <input type="file" accept="image/*" onchange="handleWatermarkUpload(event)" />
            <div class="toggle-line" style="margin-top:12px;">
              <input type="checkbox" id="watermarkEnabled" checked onchange="toggleWatermark()" />
              <span>워터마크 사용</span>
            </div>
          </div>
          <div>
            <label for="watermarkOpacity">투명도: <span id="watermarkOpacityText">${watermarkOpacity}%</span></label>
            <input id="watermarkOpacity" type="range" min="5" max="100" value="${watermarkOpacity}" oninput="changeWatermarkOpacity()" />
          </div>
        </div>

        <h3>1080×1350 미리보기</h3>
        <div class="preview-grid" id="cardPreviews"></div>

        <div class="download-all">
          <button class="blue" onclick="downloadAllCards()">전체 PNG 저장</button>
          <button class="secondary" onclick="copyResult()">수정 문구 복사</button>
        </div>
      `;

      renderCardEditors();
      renderTemplateButtons();
      renderCardPreviews();
    }

    function renderCardEditors() {
      const editor = document.getElementById("cardEditors");
      editor.innerHTML = cardNewsData.map((card, index) => `
        <div class="edit-item">
          <div class="edit-item-title">${index + 1}장</div>
          <label>제목</label>
          <textarea oninput="updateCardText(${index}, 'title', this.value)">${escapeHtml(card.title)}</textarea>
          <label style="margin-top:10px;">본문</label>
          <textarea oninput="updateCardText(${index}, 'body', this.value)">${escapeHtml(card.body)}</textarea>
          <label style="margin-top:10px;">이미지 추가</label>
          <input type="file" accept="image/*" onchange="handleCardImageUpload(event, ${index})" />
          <div class="image-controls">
            <div>
              <label>이미지 방식</label>
              <select onchange="changeCardImageFit(${index}, this.value)">
                <option value="cover" ${card.imageFit === "cover" ? "selected" : ""}>채우기</option>
                <option value="contain" ${card.imageFit === "contain" ? "selected" : ""}>맞추기</option>
                <option value="original" ${card.imageFit === "original" ? "selected" : ""}>원본비율</option>
              </select>
            </div>
            <button class="danger" onclick="removeCardImage(${index})">이미지 제거</button>
          </div>
        </div>
      `).join("");
    }

    function renderTemplateButtons() {
      const grid = document.getElementById("templateGrid");
      grid.innerHTML = Object.entries(templates).map(([key, tpl]) => `
        <div class="template-btn ${selectedTemplate === key ? "active" : ""}" onclick="selectTemplate('${key}')">
          <strong>${tpl.name}</strong>
          <span>${tpl.desc}</span>
        </div>
      `).join("");
    }

    function selectTemplate(key) {
      selectedTemplate = key;
      renderTemplateButtons();
      renderCardPreviews();
    }

    function changeTitleSize(value) {
      titleSize = Number(value);
      document.getElementById("titleSizeText").textContent = titleSize + "px";
      renderCardPreviews();
    }

    function changeBodySize(value) {
      bodySize = Number(value);
      document.getElementById("bodySizeText").textContent = bodySize + "px";
      renderCardPreviews();
    }

    function changeTitleColor(value) {
      titleColor = value;
      document.getElementById("titleColorText").textContent = value;
      renderCardPreviews();
    }

    function changeBodyColor(value) {
      bodyColor = value;
      document.getElementById("bodyColorText").textContent = value;
      renderCardPreviews();
    }

    function updateCardText(index, field, value) {
      cardNewsData[index][field] = value;
      updatePlainCardText();
      renderCardPreviews();
    }

    function updatePlainCardText() {
      lastPlainText = cardNewsData.map((card, index) =>
        `[${index + 1}장]\n제목: ${card.title}\n본문: ${card.body}`
      ).join("\n\n");
    }

    function handleWatermarkUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = e => {
        watermarkDataUrl = e.target.result;
        renderCardPreviews();
      };
      reader.readAsDataURL(file);
    }

    function toggleWatermark() {
      watermarkEnabled = document.getElementById("watermarkEnabled").checked;
      renderCardPreviews();
    }

    function changeWatermarkOpacity() {
      watermarkOpacity = Number(document.getElementById("watermarkOpacity").value);
      document.getElementById("watermarkOpacityText").textContent = watermarkOpacity + "%";
      renderCardPreviews();
    }

    function handleCardImageUpload(event, index) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = e => {
        cardNewsData[index].image = e.target.result;
        renderCardPreviews();
      };
      reader.readAsDataURL(file);
    }

    function changeCardImageFit(index, value) {
      cardNewsData[index].imageFit = value;
      renderCardPreviews();
    }

    function removeCardImage(index) {
      cardNewsData[index].image = "";
      renderCardPreviews();
    }

    function renderCardPreviews() {
      const preview = document.getElementById("cardPreviews");
      if (!preview) return;

      preview.innerHTML = cardNewsData.map((card, index) => `
        <div class="preview-item">
          ${buildCardHTML(card, index, false)}
          <button class="secondary" style="width:100%; margin-top:10px;" onclick="downloadSingleCard(${index})">${index + 1}장 PNG 저장</button>
        </div>
      `).join("");
    }

    function buildCardHTML(card, index, outputSize) {
      const tpl = templates[selectedTemplate];
      const wmClass = watermarkEnabled && watermarkDataUrl ? "wm-on" : "";
      const outputClass = outputSize ? "output-size" : "";
      const imageClass = card.image ? "has-card-image" : "";
      const wmOpacityStyle = `opacity:${watermarkOpacity / 100}`;
      const previewTitle = titleSize / 5;
      const previewBody = bodySize / 4.35;
      const fitClass = card.imageFit === "contain" ? "image-fit-contain" : card.imageFit === "original" ? "image-fit-original" : "image-fit-cover";

      return `
        <div
          class="ig-card ${outputClass} ${tpl.className} ${wmClass} ${imageClass}"
          id="${outputSize ? `render-card-${index}` : `preview-card-${index}`}"
          style="--output-title-size:${titleSize}px; --output-body-size:${bodySize}px; --preview-title-size:${previewTitle}px; --preview-body-size:${previewBody}px; --title-color:${titleColor}; --body-color:${bodyColor};"
        >
          ${card.image ? `<div class="card-image"><img class="${fitClass}" src="${card.image}" /></div>` : ""}
          <div class="ig-number">${String(index + 1).padStart(2, "0")}</div>
          <div class="ig-title">${escapeHtml(card.title)}</div>
          <div class="ig-body">${escapeHtml(card.body)}</div>
          ${watermarkDataUrl ? `<img class="watermark" style="${wmOpacityStyle}" src="${watermarkDataUrl}" />` : ""}
        </div>
      `;
    }

    async function downloadSingleCard(index) {
      const area = document.getElementById("hiddenRenderArea");
      area.innerHTML = buildCardHTML(cardNewsData[index], index, true);

      const card = document.getElementById(`render-card-${index}`);
      const canvas = await html2canvas(card, {
        width: 1080,
        height: 1350,
        scale: 1,
        backgroundColor: null,
        useCORS: true
      });

      const a = document.createElement("a");
      a.download = `cardnews-${String(index + 1).padStart(2, "0")}.png`;
      a.href = canvas.toDataURL("image/png");
      a.click();

      area.innerHTML = "";
    }

    async function downloadAllCards() {
      for (let i = 0; i < cardNewsData.length; i++) {
        await downloadSingleCard(i);
        await new Promise(resolve => setTimeout(resolve, 250));
      }
    }

    function renderInstagram(data) {
      const hashtags = Array.isArray(data.hashtags) ? data.hashtags : [];

      lastPlainText =
`${data.caption || ""}

${hashtags.map(tag => tag.startsWith("#") ? tag : "#" + tag).join(" ")}`;

      document.getElementById("result").innerHTML = `
        <div class="content-card">
          <b>인스타 설명글</b>
          <p>${escapeHtml(data.caption || "")}</p>
          <div class="hashtags">
            ${hashtags.map(tag => `<span class="hashtag">${escapeHtml(tag.startsWith("#") ? tag : "#" + tag)}</span>`).join("")}
          </div>
        </div>
      `;
    }

    function renderBlog(data) {
      lastPlainText =
`${data.title || ""}

[도입부]
${data.intro || ""}

[본문]
${data.body || ""}

[마무리]
${data.conclusion || ""}`;

      document.getElementById("result").innerHTML = `
        <div class="content-card">
          <b>블로그</b>
          <h2 class="blog-title">${escapeHtml(data.title || "")}</h2>
          <h4 class="section-title">도입부</h4>
          <p>${escapeHtml(data.intro || "")}</p>
          <h4 class="section-title">본문</h4>
          <p>${escapeHtml(data.body || "")}</p>
          <h4 class="section-title">마무리</h4>
          <p>${escapeHtml(data.conclusion || "")}</p>
        </div>
      `;
    }

    function renderThreads(posts) {
      lastPlainText = posts.map((item, index) =>
        `${index + 1}/${posts.length}\n${item.post}`
      ).join("\n\n");

      document.getElementById("result").innerHTML =
        posts.map((item, index) => `
          <div class="content-card">
            <b>${index + 1}번째 스레드</b>
            <p>${escapeHtml(item.post)}</p>
          </div>
        `).join("");
    }

    function renderRaw(raw) {
      lastPlainText = raw;
      document.getElementById("result").innerHTML =
        `<div class="text-output">${escapeHtml(raw)}</div>`;
    }

    function copyResult() {
      if (!lastPlainText) {
        alert("복사할 결과가 없습니다.");
        return;
      }

      navigator.clipboard.writeText(lastPlainText)
        .then(() => alert("결과를 복사했습니다."));
    }

    function clearResult() {
      lastPlainText = "";
      cardNewsData = [];
      document.getElementById("result").innerHTML = `
        <div class="empty">
          왼쪽에서 주제와 콘텐츠 유형을 선택한 뒤<br />
          생성하기 버튼을 눌러주세요.
        </div>
      `;
      setStatus("");
    }

    function setStatus(message) {
      document.getElementById("status").textContent = message;
    }

    function escapeHtml(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll('"', "&quot;");
    }
  </script>
</body>
</html>
